# Workflow to enforce conventional commit formatting for Pull Request titles.
# For more info: https://github.com/amannn/action-semantic-pull-request

name: "Semantic PR Check"

on:
  pull_request_target:
    types:
      - reopened
      - edited
      - opened
      - synchronize

permissions:
  pull-requests: read
  statuses: write

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject of the PR title must start with a lowercase letter.
            Example: "feat: add female developer ranking page" (correct)
            Example: "feat: Add female developer ranking page" (incorrect - subject starts with capital letter)
